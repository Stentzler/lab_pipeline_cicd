name: Run pip-audit
description: Audit Python dependencies listed in a requirements file.

inputs:
  requirements_path:
    description: Path to the requirements file passed to pip-audit.
    required: true

runs:
  using: composite
  steps:
    - name: Run pip-audit
      uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
      with:
        inputs: ${{ inputs.requirements_path }}
