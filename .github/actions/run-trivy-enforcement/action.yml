name: Run Trivy Enforcement
description: Apply the final Trivy gate after the image scan finishes.

inputs:
  trivy_job_result:
    description: Result reported by the Trivy job.
    required: true
  trivy_blocking:
    description: Whether Trivy found blocking vulnerabilities.
    required: true

runs:
  using: composite
  steps:
    - name: Show received Trivy status
      shell: bash
      run: |
        echo "Trivy job result = ${{ inputs.trivy_job_result }}"
        echo "Trivy blocking   = ${{ inputs.trivy_blocking }}"

    - name: Fail if Trivy scan failed
      if: ${{ inputs.trivy_job_result != 'success' }}
      shell: bash
      run: |
        echo "Trivy did not complete successfully."
        exit 1

    - name: Fail if Trivy found blocking vulnerabilities
      if: ${{ inputs.trivy_blocking == 'true' }}
      shell: bash
      run: |
        echo "Trivy found HIGH/CRITICAL vulnerabilities."
        exit 1

    - name: Trivy gate passed
      if: ${{ inputs.trivy_job_result == 'success' && inputs.trivy_blocking != 'true' }}
      shell: bash
      run: echo "Trivy final enforcement passed."
