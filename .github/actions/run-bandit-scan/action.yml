name: Run Bandit Scan
description: Install and run Bandit as a CI security gate.

inputs:
  source_dir:
    description: Source directory scanned by Bandit.
    required: true
  python_version:
    description: Python version used to install Bandit.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Python environment
      uses: ./.github/actions/setup-python-tooling
      with:
        python_version: ${{ inputs.python_version }}
        cache_dependency_path: app/requirements.txt
        install_command: |-
          python -m pip install --upgrade pip
          python -m pip install bandit
        working_directory: .

    - name: Run Bandit
      shell: bash
      run: python -m bandit -r "${{ inputs.source_dir }}" -ll -ii
