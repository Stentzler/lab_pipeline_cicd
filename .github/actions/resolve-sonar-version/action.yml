name: Resolve Sonar Version
description: Resolve the SonarQube project version from a release branch PR into main.

inputs:
  github_token:
    description: GitHub token used to inspect the PR associated with the current commit.
    required: true
  repository:
    description: GitHub repository in owner/name format.
    required: true
  commit_sha:
    description: Commit SHA pushed to the target branch.
    required: true
  target_branch:
    description: Branch that the associated PR must target.
    required: true
    default: main

outputs:
  project_version:
    description: Version extracted from the release branch name.
    value: ${{ steps.resolve.outputs.project_version }}

runs:
  using: composite
  steps:
    - name: Resolve version from associated PR
      id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPOSITORY: ${{ inputs.repository }}
        COMMIT_SHA: ${{ inputs.commit_sha }}
        TARGET_BRANCH: ${{ inputs.target_branch }}
      run: |
        set -euo pipefail

        mapfile -t associated_prs < <(
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPOSITORY}/commits/${COMMIT_SHA}/pulls" \
            --jq '.[] | [.number, .base.ref, .head.ref] | @tsv'
        )

        if [ "${#associated_prs[@]}" -eq 0 ]; then
          echo "No pull request is associated with commit ${COMMIT_SHA}."
          exit 1
        fi

        valid_versions=()
        invalid_prs=()

        for associated_pr in "${associated_prs[@]}"; do
          IFS=$'\t' read -r pr_number base_ref head_ref <<< "$associated_pr"

          if [ "$base_ref" != "$TARGET_BRANCH" ]; then
            continue
          fi

          if [[ "$head_ref" =~ ^release/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            valid_versions+=("${BASH_REMATCH[1]}")
          else
            invalid_prs+=("#${pr_number} from ${head_ref}")
          fi
        done

        if [ "${#invalid_prs[@]}" -gt 0 ]; then
          echo "Associated PRs targeting ${TARGET_BRANCH} must come from release/vX.Y.Z branches."
          echo "Invalid PRs: ${invalid_prs[*]}"
          exit 1
        fi

        if [ "${#valid_versions[@]}" -eq 0 ]; then
          echo "No associated PR targeting ${TARGET_BRANCH} came from a release/vX.Y.Z branch."
          exit 1
        fi

        if [ "${#valid_versions[@]}" -gt 1 ]; then
          echo "Multiple release versions are associated with commit ${COMMIT_SHA}: ${valid_versions[*]}"
          exit 1
        fi

        echo "Sonar project version: ${valid_versions[0]}"
        echo "project_version=${valid_versions[0]}" >> "$GITHUB_OUTPUT"
