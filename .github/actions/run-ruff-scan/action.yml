name: Run Ruff Scan
description: Install and run Ruff as a CI quality gate.

inputs:
  app_dir:
    description: Directory checked by Ruff.
    required: true
  config_path:
    description: Ruff config path.
    required: true

runs:
  using: composite
  steps:
    - name: Install Ruff
      uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3.6.1

    - name: Run Ruff
      shell: bash
      run: ruff check "${{ inputs.app_dir }}" --config "${{ inputs.config_path }}"
