name: Reusable Bandit

on:
  workflow_call:
    inputs:
      source_dir:
        required: true
        type: string
      python_version:
        required: true
        type: string
      report_retention_days:
        required: true
        type: number

permissions:
  contents: read

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-tooling
        with:
          python_version: ${{ inputs.python_version }}
          cache_dependency_path: app/requirements.txt
          install_command: |-
            python -m pip install --upgrade pip
            python -m pip install bandit
          working_directory: .

      - name: Run Bandit and save JSON report
        id: bandit
        run: |
          mkdir -p reports
          set +e
          python -m bandit \
            -r "${{ inputs.source_dir }}" \
            -f json \
            -o reports/bandit-report.json \
            -ll \
            -ii
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload Bandit report
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: bandit-report
          path: reports/bandit-report.json
          if-no-files-found: error
          retention-days: ${{ inputs.report_retention_days }}

      - name: Fail if Bandit found issues
        if: steps.bandit.outputs.exit_code != '0'
        run: exit 1
