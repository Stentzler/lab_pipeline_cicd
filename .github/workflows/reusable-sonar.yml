name: Reusable SonarQube

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: false
    inputs:
      sonar_environment:
        required: false
        type: string
        default: SONAR_TOKEN
      sonar_host_url:
        required: false
        type: string
        default: ''
      project_base_dir:
        required: false
        type: string
        default: app
      ruff_artifact_name:
        required: false
        type: string
        default: ruff-report
      bandit_artifact_name:
        required: false
        type: string
        default: bandit-report
      test_artifact_name:
        required: false
        type: string
        default: test-reports
      trivy_artifact_name:
        required: false
        type: string
        default: trivy-report

permissions:
  contents: read

jobs:
  sonar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: ${{ inputs.sonar_environment }}
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Create report directories
        run: |
          mkdir -p "${{ inputs.project_base_dir }}/reports"

      - name: Download Ruff report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ inputs.ruff_artifact_name }}
          path: ${{ inputs.project_base_dir }}/reports

      - name: Download Bandit report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ inputs.bandit_artifact_name }}
          path: ${{ inputs.project_base_dir }}/reports

      - name: Download test reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ inputs.test_artifact_name }}
          path: ${{ inputs.project_base_dir }}

      - name: Download Trivy SARIF report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ inputs.trivy_artifact_name }}
          path: ${{ inputs.project_base_dir }}/reports

      - name: Debug Sonar env
        env:
          SONAR_HOST_URL: ${{ inputs.sonar_host_url || vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_HOST_URL" ]; then
            echo "SONAR_HOST_URL is empty"
            exit 1
          else
            echo "SONAR_HOST_URL is present"
          fi

          if [ -z "$SONAR_TOKEN" ]; then
            echo "SONAR_TOKEN is empty"
            exit 1
          else
            echo "SONAR_TOKEN is present"
          fi

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ inputs.sonar_host_url || vars.SONAR_HOST_URL }}
        with:
          projectBaseDir: ${{ inputs.project_base_dir }}
