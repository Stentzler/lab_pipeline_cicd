name: Reusable Ruff

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1


      - name: Run Ruff lint
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3.6.1
        with:
          # We point Ruff at the app directory.
          # --output-format=github makes findings appear as GitHub annotations.
          args: "check app --output-format=github"