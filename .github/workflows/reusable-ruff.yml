name: Reusable Ruff

# This workflow is not triggered directly by push/pull_request.
# It is meant to be called by another workflow via "uses:".
on:
  workflow_call:

# Minimal permission needed here.
# This workflow only reads repository contents.
permissions:
  contents: read

jobs:
  linter:
    # GitHub-hosted runner.
    runs-on: ubuntu-latest

    # Hard timeout for safety.
    timeout-minutes: 2

    steps:
      - name: Checkout repository
        # Downloads the repository content into the runner.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Ruff
        # This action installs Ruff in the runner environment.
        # After this, the "ruff" command becomes available.
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3.6.1

      - name: Run Ruff and save JSON report
        # "id" gives this step a name that can be referenced later.
        # Example: steps.ruff.outputs.exit_code
        id: ruff
        run: |
          # Create the folder that will store reports used later by SonarQube.
          mkdir -p reports

          # Disable "fail immediately on error" for this step.
          # Normally, if Ruff finds issues, the shell exits here and the next lines do not run.
          # We do this because we WANT the JSON report to be created even when Ruff fails.
          set +e

          # Run Ruff against the app folder.
          # --config points Ruff to your project configuration.
          # --output-format=json makes the output usable by SonarQube later.
          # ">" redirects stdout into a file.
          ruff check app \
            --config app/pyproject.toml \
            --output-format=json \
            > reports/ruff-report.json

          # "$?" contains the exit code of the last command executed.
          # 0  = Ruff found no problems
          # nonzero = Ruff found issues or failed
          #
          # "$GITHUB_OUTPUT" is a special GitHub Actions file.
          # Writing "name=value" into it exposes that value as a step output.
          # Later we can read it as: steps.ruff.outputs.exit_code
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

          # Re-enable normal shell behavior for the rest of the script/job.
          set -e

      - name: Upload Ruff report
        # Saves the generated JSON as a workflow artifact.
        # Another job can later download it, or you can inspect it manually in GitHub Actions.
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          # Logical name shown in the Actions UI.
          name: ruff-report

          # File to upload.
          path: reports/ruff-report.json

      - name: Fail if Ruff found issues
        # "if:" is a conditional.
        # This step only runs when Ruff's stored exit code is NOT 0.
        #
        # Why this is needed:
        # We intentionally prevented the previous step from failing immediately
        # so that we could still save/upload the report.
        # Now we restore Ruff as a real CI gate by failing here.
        if: steps.ruff.outputs.exit_code != '0'
        run: exit 1