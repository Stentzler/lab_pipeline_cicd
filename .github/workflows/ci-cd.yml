name: CI/CD - Python API

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main
      - 'release/**'
    paths:
      - 'app/**'
      - '.github/actions/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/actions/**'
      - '.github/workflows/**'

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  APP_DIR: app
  COVERAGE_FAIL_UNDER: 80
  IMAGE_NAME: study-api
  IMAGE_RETENTION_DAYS: 1
  PYTHON_VERSION: '3.12'
  REPORT_RETENTION_DAYS: 1
  REQUIREMENTS_PATH: requirements.txt
  REQUIREMENTS_FILE: app/requirements.txt
  SONAR_ENVIRONMENT: SONAR_TOKEN
  TEST_ARTIFACT_REPORT: test-reports
  TRIVY_ARTIFACT_REPORT: trivy-report

jobs:
  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      app_dir: ${{ steps.values.outputs.app_dir }}
      coverage_fail_under: ${{ steps.values.outputs.coverage_fail_under }}
      image_name: ${{ steps.values.outputs.image_name }}
      image_tag: ${{ steps.values.outputs.image_tag }}
      image_artifact_name: ${{ steps.values.outputs.image_artifact_name }}
      image_retention_days: ${{ steps.values.outputs.image_retention_days }}
      python_version: ${{ steps.values.outputs.python_version }}
      report_retention_days: ${{ steps.values.outputs.report_retention_days }}
      requirements_path: ${{ steps.values.outputs.requirements_path }}
      requirements_file: ${{ steps.values.outputs.requirements_file }}
      sonar_environment: ${{ steps.values.outputs.sonar_environment }}
      test_artifact_report: ${{ steps.values.outputs.test_artifact_report }}
      trivy_artifact_report: ${{ steps.values.outputs.trivy_artifact_report }}
    steps:
      - name: Prepare pipeline values
        id: values
        run: |
          echo "app_dir=${APP_DIR}" >> "$GITHUB_OUTPUT"
          echo "coverage_fail_under=${COVERAGE_FAIL_UNDER}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_artifact_name=docker-image-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_retention_days=${IMAGE_RETENTION_DAYS}" >> "$GITHUB_OUTPUT"
          echo "python_version=${PYTHON_VERSION}" >> "$GITHUB_OUTPUT"
          echo "report_retention_days=${REPORT_RETENTION_DAYS}" >> "$GITHUB_OUTPUT"
          echo "requirements_path=${REQUIREMENTS_PATH}" >> "$GITHUB_OUTPUT"
          echo "requirements_file=${REQUIREMENTS_FILE}" >> "$GITHUB_OUTPUT"
          echo "sonar_environment=${SONAR_ENVIRONMENT}" >> "$GITHUB_OUTPUT"
          echo "test_artifact_report=${TEST_ARTIFACT_REPORT}" >> "$GITHUB_OUTPUT"
          echo "trivy_artifact_report=${TRIVY_ARTIFACT_REPORT}" >> "$GITHUB_OUTPUT"

  ruff:
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Run Ruff scan
        uses: ./.github/actions/run-ruff-scan
        with:
          app_dir: ${{ needs.metadata.outputs.app_dir }}
          config_path: ${{ needs.metadata.outputs.app_dir }}/pyproject.toml

  bandit:
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Run Bandit scan
        uses: ./.github/actions/run-bandit-scan
        with:
          source_dir: ${{ needs.metadata.outputs.app_dir }}/src
          python_version: ${{ needs.metadata.outputs.python_version }}

  tests:
    needs: [metadata, ruff, bandit]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Run tests
        uses: ./.github/actions/run-tests
        with:
          app_dir: ${{ needs.metadata.outputs.app_dir }}
          python_version: ${{ needs.metadata.outputs.python_version }}
          requirements_path: ${{ needs.metadata.outputs.requirements_path }}
          coverage_fail_under: ${{ needs.metadata.outputs.coverage_fail_under }}
          report_retention_days: ${{ needs.metadata.outputs.report_retention_days }}
          artifact_name: ${{ needs.metadata.outputs.test_artifact_report }}

  pip_audit:
    needs: [metadata, tests]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Run pip-audit
        uses: ./.github/actions/run-pip-audit
        with:
          requirements_path: ${{ needs.metadata.outputs.requirements_file }}

  build:
    needs: [metadata, pip_audit]
    # Build images for release branches, main, and PRs targeting main.
    if: >-
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/release/') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Build Docker image
        uses: ./.github/actions/run-build
        with:
          app_dir: ${{ needs.metadata.outputs.app_dir }}
          image_name: ${{ needs.metadata.outputs.image_name }}
          image_tag: ${{ needs.metadata.outputs.image_tag }}
          artifact_name: ${{ needs.metadata.outputs.image_artifact_name }}
          artifact_retention_days: ${{ needs.metadata.outputs.image_retention_days }}

  trivy:
    needs: [metadata, build]
    # Scan the Docker image only on branch paths that build one.
    if: >-
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/release/') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      trivy_blocking: ${{ steps.trivy.outputs.trivy_blocking }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Run Trivy scan
        id: trivy
        uses: ./.github/actions/run-trivy-report
        with:
          image_name: ${{ needs.metadata.outputs.image_name }}
          image_tag: ${{ needs.metadata.outputs.image_tag }}
          artifact_name: ${{ needs.metadata.outputs.image_artifact_name }}
          report_retention_days: ${{ needs.metadata.outputs.report_retention_days }}
          report_artifact_name: ${{ needs.metadata.outputs.trivy_artifact_report }}

  sonar:
    needs: [metadata, ruff, bandit, tests, trivy]
    # SonarQube runs only after code lands on main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_version: ${{ steps.release_version.outputs.project_version }}
    environment:
      name: ${{ needs.metadata.outputs.sonar_environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Resolve Sonar project version
        id: release_version
        uses: ./.github/actions/resolve-sonar-version
        with:
          github_token: ${{ github.token }}
          repository: ${{ github.repository }}
          commit_sha: ${{ github.sha }}
          target_branch: main

      - name: Run SonarQube scan
        uses: ./.github/actions/run-sonar-scan
        with:
          sonar_host_url: ${{ vars.SONAR_HOST_URL }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          project_base_dir: ${{ needs.metadata.outputs.app_dir }}
          project_version: ${{ steps.release_version.outputs.project_version }}
          test_artifact_report: ${{ needs.metadata.outputs.test_artifact_report }}
          trivy_artifact_report: ${{ needs.metadata.outputs.trivy_artifact_report }}

  trivy_enforcement:
    needs: trivy
    if: >-
      always() &&
      needs.trivy.result != 'skipped' &&
      (
        github.ref == 'refs/heads/main' ||
        startsWith(github.ref, 'refs/heads/release/') ||
        (github.event_name == 'pull_request' && github.base_ref == 'main')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Apply Trivy enforcement
        uses: ./.github/actions/run-trivy-enforcement
        with:
          trivy_job_result: ${{ needs.trivy.result }}
          trivy_blocking: ${{ needs.trivy.outputs.trivy_blocking }}

  notify_slack_failure:
    needs: [metadata, ruff, bandit, tests, pip_audit, build, trivy, sonar, trivy_enforcement]
    if: >-
      always() &&
      (
        contains(needs.*.result, 'failure') ||
        contains(needs.*.result, 'cancelled')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 2
    environment:
      name: SONAR_TOKEN
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Notify Slack failure
        uses: ./.github/actions/notify-slack-failure
        with:
          webhook_url: ${{ secrets.SLACK_CICD_ERRORS }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          slack_user_map: ${{ vars.SLACK_GITHUB_USER_MAP || '{}' }} # {"github_user": "slack_user_id"}

  notify_slack_success:
    needs: [metadata, ruff, bandit, tests, pip_audit, build, trivy, sonar, trivy_enforcement]
    if: >-
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 2
    environment:
      name: SONAR_TOKEN
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Notify Slack success
        uses: ./.github/actions/notify-slack-success
        with:
          webhook_url: ${{ secrets.SLACK_CICD_SUCCESS }}
