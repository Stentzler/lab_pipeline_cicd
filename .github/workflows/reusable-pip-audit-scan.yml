name: Reusable pip-audit

on:
  workflow_call:
    inputs:
      requirements_path:
        required: true
        type: string

permissions:
  contents: read

jobs:
  audit-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: ${{ inputs.requirements_path }}
