name: CI - Python API

on:
  push:
    branches:
      - develop
      - main
      - 'release/**'
    paths:
      - 'app/**'
      - '.github/workflows/pipeline-ci.yml'
  pull_request:
    branches:
      - develop
      - main
      - 'release/**'
    paths:
      - 'app/**'
      - '.github/workflows/pipeline-ci.yml'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  IMAGE_NAME: study-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ env.IMAGE_NAME }}
      image_tag: ${{ env.IMAGE_TAG }}
    steps:
      - run: echo "Preparing variables"

  ruff:
    uses: ./.github/workflows/reusable-ruff.yml

  bandit:
    uses: ./.github/workflows/reusable-bandit.yml

  tests:
    runs-on: ubuntu-latest
    needs: [ruff, bandit]
    timeout-minutes: 5

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: app/requirements.txt

      - name: Show CI context
        run: |
          echo "Branch/ref: ${{ github.ref }}"
          echo "Ref name:   ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Image name: $IMAGE_NAME"
          echo "Image tag:  $IMAGE_TAG"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check dependency graph
        run: python -m pip check

      - name: Run tests with coverage
        run: |
          mkdir -p reports

          python -m pytest tests/unit tests/integration -q \
            --cov \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=reports/junit.xml \
            --cov-fail-under=80

      - name: Upload coverage and test reports
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: test-reports
          path: |
            app/coverage.xml
            app/reports/junit.xml

  pip_audit:
    needs: tests
    uses: ./.github/workflows/reusable-pip-audit.yml

  build:
    runs-on: ubuntu-latest
    needs: [pip_audit]
    timeout-minutes: 5

    defaults:
      run:
        working-directory: app
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
  
      - name: Show image tag
        run: |
          echo "Image name = $IMAGE_NAME"
          echo "Image tag  = $IMAGE_TAG"
  
      - name: Build Docker image
        run: |
          docker build -t "$IMAGE_NAME:$IMAGE_TAG" .
  
      - name: Verify built image
        run: |
          docker image inspect "$IMAGE_NAME:$IMAGE_TAG" > /dev/null
  
      - name: Save Docker image to tarball
        run: |
          docker save -o image.tar "$IMAGE_NAME:$IMAGE_TAG"
  
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: docker-image-${{ github.sha }}
          path: app/image.tar
          retention-days: 1
          if-no-files-found: error

  trivy:
    needs: [setup, build]
    uses: ./.github/workflows/reusable-trivy-report.yml
    with:
      image_name: ${{ needs.setup.outputs.image_name }}
      image_tag: ${{ needs.setup.outputs.image_tag }}
      artifact_name: docker-image-${{ github.sha }}

  sonar:
    needs: [trivy]
    uses: ./.github/workflows/reusable-sonar.yml
    with:
      project_base_dir: app
      sonar_host_url: ${{ vars.SONAR_HOST_URL }}
      ruff_artifact_name: ruff-report
      bandit_artifact_name: bandit-report
      test_artifact_name: test-reports
      trivy_artifact_name: trivy-report
    secrets:
      sonar_token: ${{ secrets.SONAR_TOKEN }}

  trivy_enforcement:
    needs: [trivy, sonar]
    if: always()
    uses: ./.github/workflows/reusable-trivy-enforcement.yml
    with:
      trivy_job_result: ${{ needs.trivy.result }}
      trivy_blocking: ${{ needs.trivy.outputs.trivy_blocking }}