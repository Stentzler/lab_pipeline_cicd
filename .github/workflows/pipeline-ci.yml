name: CI - Python API

on:
  push:
    branches:
      - develop
      - main
      - 'release/**'
    paths:
      - 'app/**'
      - '.github/workflows/pipeline-ci.yml'
  pull_request:
    branches:
      - develop
      - main
      - 'release/**'
    paths:
      - 'app/**'
      - '.github/workflows/pipeline-ci.yml'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Shared variables for all jobs
env:
  PYTHON_VERSION: '3.12'
  IMAGE_NAME: study-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  ruff:
    uses: ./.github/workflows/reusable-ruff.yml

  bandit:
    uses: ./.github/workflows/reusable-bandit.yml

  tests:
    runs-on: ubuntu-latest
    needs:
      - ruff
      - bandit
    timeout-minutes: 5

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55 # v5.5.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: app/requirements.txt

      - name: Show CI context
        run: |
          echo "Branch/ref: ${{ github.ref }}"
          echo "Ref name:   ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Image name: $IMAGE_NAME"
          echo "Image tag:  $IMAGE_TAG"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check dependency graph
        run: python -m pip check

      - name: Run unit tests
        run: python -m pytest tests/unit -q

      - name: Run integration tests
        run: python -m pytest tests/integration -q

  build:
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 5

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd #v5.0.1

      - name: Show image tag
        run: |
          echo "Image name = $IMAGE_NAME"
          echo "Image tag  = $IMAGE_TAG"

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Show built image
        run: |
          docker images | grep "$IMAGE_NAME"