name: Reusable Ruff

on:
  workflow_call:
    inputs:
      app_dir:
        required: true
        type: string
      config_path:
        required: true
        type: string
      report_retention_days:
        required: true
        type: number

permissions:
  contents: read

jobs:
  linter:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install Ruff
        uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6 # v3.6.1

      - name: Run Ruff and save JSON report
        id: ruff
        run: |
          mkdir -p reports
          set +e
          ruff check "${{ inputs.app_dir }}" \
            --config "${{ inputs.config_path }}" \
            --output-format=json \
            > reports/ruff-report.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload Ruff report
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: ruff-report
          path: reports/ruff-report.json
          if-no-files-found: error
          retention-days: ${{ inputs.report_retention_days }}

      - name: Fail if Ruff found issues
        if: steps.ruff.outputs.exit_code != '0'
        run: exit 1
